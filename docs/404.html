<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>commendatore</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // When GitHub Pages 404s on a deep link, this page is served.
      // We store the full path/query/hash in sessionStorage, then redirect to
      // the root so our React app boots up, which then reads from sessionStorage
      // and restores the correct route.
      const path = window.location.pathname + window.location.search + window.location.hash;
      sessionStorage.setItem('gh_pages_redirect', path);
      window.location.replace('/');
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
  </body>
</html>
